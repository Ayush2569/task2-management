<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dashboard</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- NAVBAR -->

  <nav>

    <h2>Task Manager</h2>

    <div class="user-section">

      <div
        class="profile"
        onclick="toggleProfile()"
      >

        <span id="welcomeUser"></span>

      </div>

      <button onclick="logout()">
        Logout
      </button>

    </div>

  </nav>


  <!-- PROFILE BOX -->

  <div
    id="profileBox"
    class="profile-box"
  >

    <h3>User Details</h3>

    <p>
      Username:
      <span id="profileUsername"></span>
    </p>

    <p>
      Email:
      <span id="profileEmail"></span>
    </p>

  </div>


  <!-- MAIN CONTAINER -->

  <div class="container">

    <input
      type="text"
      id="title"
      placeholder="Task Title"
    >

    <input
      type="text"
      id="description"
      placeholder="Description"
    >

    <select id="priority">

      <option>Low</option>

      <option selected>
        Medium
      </option>

      <option>High</option>

    </select>

    <button onclick="addTask()">
      Add Task
    </button>

    <div id="taskList"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
